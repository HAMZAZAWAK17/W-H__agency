<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Outer Window shape -->
  <rect width="236" height="196" x="10" y="30" rx="28" fill="#0b0e14" stroke="#00f2ff" stroke-width="20"/>
  
  <!-- Top bar separator line -->
  <line x1="10" y1="85" x2="246" y2="85" stroke="#00f2ff" stroke-width="20"/>
  
  <!-- Little dots for window control -->
  <circle cx="50" cy="57" r="10" fill="#00f2ff" />
  <circle cx="85" cy="57" r="10" fill="#00f2ff" />

  <!-- Code < /> inside -->
  <g fill="none" stroke="#00f2ff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- < -->
    <polyline points="85,120 40,155 85,190" />
    <!-- / -->
    <line x1="145" y1="110" x2="111" y2="200" />
    <!-- > -->
    <polyline points="171,120 216,155 171,190" />
  </g>
</svg>